<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 2px solid white;
            display: block;
            margin-bottom: 20px;
        }
        #score {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }
        #instructions {
            color: white;
            font-size: 14px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Player 1: 0 | Player 2: 0</div>
        <canvas id="pong" width="800" height="400"></canvas>
        <div id="instructions">
            <p>Player 1: W (up) / S (down) | Player 2: Up Arrow / Down Arrow | R to reset</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        // Game variables
        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 10;
        let player1Y = (canvas.height - paddleHeight) / 2;
        let player2Y = (canvas.height - paddleHeight) / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballSpeedX = 5;
        let ballSpeedY = 5;
        let player1Score = 0;
        let player2Score = 0;

        // Keyboard input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'r') resetGame();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function draw() {
            // Clear the canvas
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = 'white';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw paddles
            ctx.fillStyle = 'white';
            ctx.fillRect(0, player1Y, paddleWidth, paddleHeight);
            ctx.fillRect(canvas.width - paddleWidth, player2Y, paddleWidth, paddleHeight);

            // Draw ball
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            // Player 1 controls (W/S)
            if (keys['w'] && player1Y > 0) {
                player1Y -= 7;
            }
            if (keys['s'] && player1Y < canvas.height - paddleHeight) {
                player1Y += 7;
            }

            // Player 2 controls (Arrow keys)
            if (keys['arrowup'] && player2Y > 0) {
                player2Y -= 7;
            }
            if (keys['arrowdown'] && player2Y < canvas.height - paddleHeight) {
                player2Y += 7;
            }

            // Ball movement
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Ball collision with top and bottom
            if (ballY + ballSize > canvas.height || ballY - ballSize < 0) {
                ballSpeedY = -ballSpeedY;
            }

            // Ball collision with paddles
            // Player 1 paddle
            if (ballX - ballSize < paddleWidth &&
                ballY > player1Y &&
                ballY < player1Y + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                ballX = paddleWidth + ballSize;
            }

            // Player 2 paddle
            if (ballX + ballSize > canvas.width - paddleWidth &&
                ballY > player2Y &&
                ballY < player2Y + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                ballX = canvas.width - paddleWidth - ballSize;
            }

            // Ball out of bounds (scoring)
            if (ballX - ballSize < 0) {
                player2Score++;
                resetBall();
            }
            if (ballX + ballSize > canvas.width) {
                player1Score++;
                resetBall();
            }

            // Update score display
            scoreDisplay.textContent = `Player 1: ${player1Score} | Player 2: ${player2Score}`;
        }

        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballSpeedX = (Math.random() > 0.5 ? 1 : -1) * 5;
            ballSpeedY = (Math.random() > 0.5 ? 1 : -1) * 5;
        }

        function resetGame() {
            player1Score = 0;
            player2Score = 0;
            player1Y = (canvas.height - paddleHeight) / 2;
            player2Y = (canvas.height - paddleHeight) / 2;
            resetBall();
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
